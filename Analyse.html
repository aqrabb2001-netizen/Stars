<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
    <title>نظام التحليل الجنائي البصري V2</title>
    
    <!-- تحميل مكتبة أيقونات وتنسيقات من الإنترنت ليعطي مظهر "أونلاين" احترافي -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #050505; color: #00ffcc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .cyber-header { border-bottom: 2px solid #00ffcc; padding: 15px; text-align: center; background: rgba(0, 255, 204, 0.05); text-shadow: 0 0 10px #00ffcc; }
        .main-display { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; position: relative; overflow: hidden; border: 1px inset #00ffcc; margin: 10px; border-radius: 10px; }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 0 15px rgba(0, 255, 204, 0.3)); }
        .control-panel { background: #0a0a0a; padding: 20px; border-radius: 20px 20px 0 0; border-top: 2px solid #00ffcc; box-shadow: 0 -10px 30px rgba(0, 255, 204, 0.1); }
        .btn-cyber { background: transparent; color: #00ffcc; border: 1px solid #00ffcc; padding: 10px; margin: 5px; font-size: 14px; transition: 0.3s; width: 45%; }
        .btn-cyber:hover, .btn-cyber:active { background: #00ffcc; color: #000; box-shadow: 0 0 20px #00ffcc; }
        .scanner-line { position: absolute; width: 100%; height: 2px; background: rgba(0, 255, 204, 0.5); top: 0; left: 0; animation: scan 3s linear infinite; display: none; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        input[type=range] { accent-color: #00ffcc; width: 100%; }
        .loading-text { color: #00ffcc; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="cyber-header">
    <i class="fas fa-microscope"></i> نظام التحليل الجنائي المتقدم
</div>

<div class="main-display" id="displayArea">
    <div class="scanner-line" id="scanner"></div>
    <p class="loading-text" id="status">انتظار تحميل الصورة...</p>
    <canvas id="canvas" style="display:none"></canvas>
</div>

<div class="control-panel">
    <input type="file" id="upload" style="display:none" accept="image/*">
    
    <div class="d-flex flex-wrap justify-content-center">
        <button class="btn btn-cyber" onclick="document.getElementById('upload').click()">
            <i class="fas fa-upload"></i> جلب ملف
        </button>
        <button class="btn btn-cyber" onclick="reset()">
            <i class="fas fa-sync"></i> إعادة ضبط
        </button>
        <button class="btn btn-cyber" onclick="applyEffect('invert')">
            <i class="fas fa-eye-slash"></i> رؤية ليلية
        </button>
        <button class="btn btn-cyber" onclick="applyEffect('gray')">
            <i class="fas fa-dna"></i> تحليل هيكلي
        </button>
    </div>

    <div class="mt-3">
        <label class="form-label" style="font-size:12px">مستوى المسح الرقمي (السطوع):</label>
        <input type="range" min="0" max="200" value="100" id="brightRange">
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const upload = document.getElementById('upload');
    const scanner = document.getElementById('scanner');
    const status = document.getElementById('status');
    const brightRange = document.getElementById('brightRange');
    let imgSource = null;

    upload.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    imgSource = img;
                    draw(img);
                    scanner.style.display = 'block';
                    status.style.display = 'none';
                    canvas.style.display = 'block';
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }
    };

    function draw(img) {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
    }

    function reset() {
        if(imgSource) draw(imgSource);
    }

    function applyEffect(type) {
        if(!imgSource) return;
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        for (let i = 0; i < data.length; i += 4) {
            if (type === 'invert') {
                data[i] = 255 - data[i];
                data[i+1] = 255 - data[i+1];
                data[i+2] = 255 - data[i+2];
            } else if (type === 'gray') {
                const v = 0.3 * data[i] + 0.59 * data[i+1] + 0.11 * data[i+2];
                data[i] = data[i+1] = data[i+2] = v;
            }
        }
        ctx.putImageData(imageData, 0, 0);
    }

    brightRange.oninput = () => {
        if(!imgSource) return;
        draw(imgSource);
        const val = brightRange.value / 100;
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
            data[i] *= val; data[i+1] *= val; data[i+2] *= val;
        }
        ctx.putImageData(imageData, 0, 0);
    };
</script>

</body>
</html>
