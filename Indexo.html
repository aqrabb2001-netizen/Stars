<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>مستكشف النجوم - جميع النجوم مع أرقام الصفوف</title>
<style>
:root{
  --bg:#06090f;--bg2:#0d1526;--bg3:#111e35;--bg4:#162040;
  --gold:#c9973a;--gold2:#f5c842;
  --cyan:#3ecfb8;--red:#e05555;
  --text:#e8dfc8;--text2:#7a6a50;
  --border:#1e2e4a;--border2:#2a3e60;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Tahoma,Arial,sans-serif;font-size:14px;display:flex;flex-direction:column}

/* NAV */
.nav{display:flex;background:var(--bg2);border-bottom:2px solid var(--border2);flex-shrink:0}
.nav-btn{flex:1;padding:12px 4px 10px;font-size:10px;font-weight:600;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent}
.nav-btn .ico{display:block;font-size:18px}
.nav-btn.active{color:var(--gold2);border-bottom-color:var(--gold)}

/* PAGES */
.page{display:none;flex:1;overflow-y:auto;padding:12px;flex-direction:column}
.page.active{display:flex}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:14px;margin-bottom:12px}
.card-title{font-size:13px;color:var(--gold2);margin-bottom:12px}

/* FORM */
label{display:block;font-size:11px;color:var(--text2);margin-bottom:5px}
input, select{width:100%;padding:10px;background:var(--bg3);border:1.5px solid var(--border);color:var(--text);border-radius:8px;font-size:14px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg{margin-bottom:12px}

/* MODE TABS */
.mode-tabs{display:flex;gap:6px;margin-bottom:14px}
.mode-tab{flex:1;padding:9px;text-align:center;border-radius:8px;border:1.5px solid var(--border);color:var(--text2);cursor:pointer}
.mode-tab.active{background:rgba(201,151,58,.15);border-color:var(--gold);color:var(--gold2)}

/* BTN */
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#c9832a,#8a5515);color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer;font-weight:700}

/* SUMMARY */
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sum-box{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:10px;text-align:center}
.sum-label{font-size:10px;color:var(--text2)}
.sum-val{font-size:16px;color:var(--gold2);font-weight:700}

/* TABLE - مع عمود إضافي للرقم */
.res-tabs{display:flex;background:var(--bg3);border-radius:10px 10px 0 0;border:1px solid var(--border2);border-bottom:none}
.res-tab{flex:1;padding:10px;text-align:center;cursor:pointer}
.res-tab.active{background:var(--bg4);color:var(--gold2)}
.tbl-container{background:var(--bg3);border:1px solid var(--border2);border-radius:0 0 10px 10px;display:flex;flex-direction:column;height:300px}
.res-header{display:grid;grid-template-columns:50px 1fr 80px 80px;padding:8px 12px;color:var(--gold);border-bottom:1px solid var(--border2);cursor:pointer}
.res-header span{text-align:center}
.res-header span:first-child{text-align:center}
.res-list{overflow-y:auto;flex:1}
.res-row{display:grid;grid-template-columns:50px 1fr 80px 80px;padding:8px 12px;border-bottom:1px solid rgba(30,46,74,.5);align-items:center}
.res-row.fixed{background:rgba(62,207,184,.04)}
.rnum{color:var(--text2);font-size:12px;text-align:center}
.rname{color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rdist{color:var(--gold2);font-weight:700;text-align:center}
.rbear{color:var(--cyan);font-weight:600;text-align:center}
.no-data{padding:20px;text-align:center;color:var(--text2)}
</style>
</head>
<body>

<!-- NAV -->
<div class="nav">
  <button class="nav-btn active" onclick="showPage('input')"><span class="ico">⚙️</span>إدخال</button>
  <button class="nav-btn" onclick="showPage('results')"><span class="ico">📊</span>نتائج</button>
  <button class="nav-btn" onclick="showPage('rotated')"><span class="ico">🔃</span>مدار</button>
</div>

<!-- PAGE INPUT -->
<div class="page active" id="page-input">
  <div class="card">
    <div class="card-title">✦ وضع الإدخال</div>
    <div class="mode-tabs">
      <div class="mode-tab active" onclick="setMode(1,this)">نجمان معروفان</div>
      <div class="mode-tab" onclick="setMode(2,this)">نجم + تحجيم + إدارة</div>
    </div>

    <div id="mode1">
      <div class="fg">
        <label>نجم أ</label>
        <select id="starA" class="star-select" onchange="saveInputs()"></select>
      </div>
      <div class="fg">
        <label>نجم ب</label>
        <select id="starB" class="star-select" onchange="saveInputs()"></select>
      </div>
      <div class="row2">
        <div class="fg"><label>المسافة بين أ-ب</label><input type="number" id="distAB" step="0.01" oninput="saveInputs()"></div>
        <div class="fg"><label>البوصلة أ ← ب (°)</label><input type="number" id="bearAB" step="0.1" oninput="saveInputs()"></div>
      </div>
    </div>

    <div id="mode2" style="display:none">
      <div class="fg">
        <label>النجم المعروف</label>
        <select id="starM" class="star-select" onchange="saveInputs()"></select>
      </div>
      <div class="row2">
        <div class="fg"><label>التحجيم</label><input type="number" id="scaleM" step="0.001" oninput="saveInputs()"></div>
        <div class="fg"><label>الإدارة (°)</label><input type="number" id="rotM" step="0.1" oninput="saveInputs()"></div>
      </div>
    </div>

    <div id="errorMsg" style="color:#e05555; padding:10px; display:none"></div>
    <button class="btn" onclick="calculate()">✦ احسب</button>
  </div>

  <div class="card" id="abSummary" style="display:none">
    <div class="card-title">📊 ملخص الحساب</div>
    <div class="sum-grid">
      <div class="sum-box"><div class="sum-label">التحجيم</div><div class="sum-val" id="sumScale">—</div></div>
      <div class="sum-box"><div class="sum-label">الإدارة</div><div class="sum-val" id="sumRot">—</div></div>
    </div>
  </div>
</div>

<!-- PAGE RESULTS -->
<div class="page" id="page-results">
  <div class="res-tabs">
    <div class="res-tab active" onclick="setResTab('center')">🎯 المركز</div>
    <div class="res-tab" onclick="setResTab('A')">📍 من أ</div>
    <div class="res-tab" onclick="setResTab('B')">📍 من ب</div>
  </div>
  <div class="tbl-container">
    <div class="res-header">
      <span onclick="sortTable('row')">#</span>
      <span onclick="sortTable('name')">الاسم</span>
      <span onclick="sortTable('dist')" style="text-align:center">المسافة</span>
      <span onclick="sortTable('bear')" style="text-align:center">البوصلة°</span>
    </div>
    <div class="res-list" id="resultsTable">
      <div class="no-data">احسب النتائج أولاً</div>
    </div>
  </div>
</div>

<!-- PAGE ROTATED -->
<div class="page" id="page-rotated">
  <div class="card">
    <div class="card-title">🔃 إعدادات مدار</div>
    <div class="row2">
      <div class="fg"><label>التحجيم</label><input type="number" id="manScale" value="1" step="0.001" oninput="saveInputs()"></div>
      <div class="fg"><label>الإدارة (°)</label><input type="number" id="manRot" value="0" step="0.1" oninput="saveInputs()"></div>
    </div>
    <button class="btn" onclick="calcRotated()">احسب المدار</button>
  </div>
  <div class="tbl-container">
    <div class="res-header">
      <span onclick="sortRotTable('row')">#</span>
      <span onclick="sortRotTable('name')">الاسم</span>
      <span onclick="sortRotTable('dist')" style="text-align:center">المسافة</span>
      <span onclick="sortRotTable('bear')" style="text-align:center">البوصلة°</span>
    </div>
    <div class="res-list" id="rotTable">
      <div class="no-data">احسب المدار أولاً</div>
    </div>
  </div>
</div>

// متغيرات الحالة
let mode = 1; // 1 = نجمان, 2 = نجم واحد
let results = { center: [], A: [], B: [] };
let rotResults = [];
let currentSort = { field: 'row', dir: 'asc' };
let rotSort = { field: 'row', dir: 'asc' };

// تهيئة الصفحة
document.addEventListener('DOMContentLoaded', () => {
  populateSelects();
  loadInputs();
});

// تعبئة القوائم المنسدلة
function populateSelects() {
  const starA = document.getElementById('starA');
  const starB = document.getElementById('starB');
  const starM = document.getElementById('starM');
  
  STARS.forEach((s, index) => {
    const option = new Option(`${s.row} - ${s.name}`, index);
    starA.add(option.cloneNode(true));
    starB.add(option.cloneNode(true));
    starM.add(option.cloneNode(true));
  });
}

// حفظ المدخلات
function saveInputs() {
  const data = {
    mode: mode,
    starA: document.getElementById('starA').value,
    starB: document.getElementById('starB').value,
    starM: document.getElementById('starM').value,
    distAB: document.getElementById('distAB').value,
    bearAB: document.getElementById('bearAB').value,
    scaleM: document.getElementById('scaleM').value,
    rotM: document.getElementById('rotM').value,
    manScale: document.getElementById('manScale').value,
    manRot: document.getElementById('manRot').value
  };
  localStorage.setItem('starData', JSON.stringify(data));
}

// تحميل المدخلات
function loadInputs() {
  const saved = localStorage.getItem('starData');
  if (!saved) return;
  
  try {
    const data = JSON.parse(saved);
    if (data.mode !== undefined) setMode(data.mode, null, true);
    if (data.starA) document.getElementById('starA').value = data.starA;
    if (data.starB) document.getElementById('starB').value = data.starB;
    if (data.starM) document.getElementById('starM').value = data.starM;
    if (data.distAB) document.getElementById('distAB').value = data.distAB;
    if (data.bearAB) document.getElementById('bearAB').value = data.bearAB;
    if (data.scaleM) document.getElementById('scaleM').value = data.scaleM;
    if (data.rotM) document.getElementById('rotM').value = data.rotM;
    if (data.manScale) document.getElementById('manScale').value = data.manScale;
    if (data.manRot) document.getElementById('manRot').value = data.manRot;
  } catch(e) {}
}

// تبديل وضع الإدخال
function setMode(newMode, el, skipSave = false) {
  mode = newMode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  else document.querySelectorAll('.mode-tab')[mode-1].classList.add('active');
  
  document.getElementById('mode1').style.display = mode === 1 ? 'block' : 'none';
  document.getElementById('mode2').style.display = mode === 2 ? 'block' : 'none';
  
  if (!skipSave) saveInputs();
}

// الحساب الرئيسي
function calculate() {
  hideError();
  
  if (mode === 1) {
    const aIdx = document.getElementById('starA').value;
    const bIdx = document.getElementById('starB').value;
    if (aIdx === '' || bIdx === '') return showError('اختر نجمين');
    
    const selA = STARS[aIdx];
    const selB = STARS[bIdx];
    
    const distInput = parseFloat(document.getElementById('distAB').value);
    const bearInput = parseFloat(document.getElementById('bearAB').value);
    if (isNaN(distInput) || isNaN(bearInput)) return showError('أدخل المسافة والبوصلة');
    
    const d = distance(selA.x, selA.y, selB.x, selB.y);
    if (d === 0) return showError('النجمان متطابقان');
    
    const sb = bearing(selA.x, selA.y, selB.x, selB.y);
    const scale = distInput / d;
    const rot = (bearInput - sb + 360) % 360;
    
    document.getElementById('sumScale').textContent = scale.toFixed(6);
    document.getElementById('sumRot').textContent = rot.toFixed(2) + '°';
    document.getElementById('abSummary').style.display = 'block';
    
    // تحويل جميع النجوم
    results.center = STARS.map(s => {
      const t = transform(s.x, s.y, scale, rot);
      return { name: s.name, row: s.row, fixed: s.fixed, dist: distance(0, 0, t.x, t.y), bear: bearing(0, 0, t.x, t.y) };
    });
    
    const tA = transform(selA.x, selA.y, scale, rot);
    results.A = STARS.map(s => {
      const t = transform(s.x, s.y, scale, rot);
      return { name: s.name, row: s.row, fixed: s.fixed, dist: distance(tA.x, tA.y, t.x, t.y), bear: bearing(tA.x, tA.y, t.x, t.y) };
    });
    
    const tB = transform(selB.x, selB.y, scale, rot);
    results.B = STARS.map(s => {
      const t = transform(s.x, s.y, scale, rot);
      return { name: s.name, row: s.row, fixed: s.fixed, dist: distance(tB.x, tB.y, t.x, t.y), bear: bearing(tB.x, tB.y, t.x, t.y) };
    });
    
  } else {
    const mIdx = document.getElementById('starM').value;
    if (mIdx === '') return showError('اختر نجماً');
    
    const selM = STARS[mIdx];
    
    const scale = parseFloat(document.getElementById('scaleM').value);
    const rot = parseFloat(document.getElementById('rotM').value);
    if (isNaN(scale) || isNaN(rot)) return showError('أدخل التحجيم والإدارة');
    
    results.center = STARS.map(s => {
      const t = transform(s.x, s.y, scale, rot);
      return { name: s.name, row: s.row, fixed: s.fixed, dist: distance(0, 0, t.x, t.y), bear: bearing(0, 0, t.x, t.y) };
    });
    
    const tM = transform(selM.x, selM.y, scale, rot);
    results.A = STARS.map(s => {
      const t = transform(s.x, s.y, scale, rot);
      return { name: s.name, row: s.row, fixed: s.fixed, dist: distance(tM.x, tM.y, t.x, t.y), bear: bearing(tM.x, tM.y, t.x, t.y) };
    });
    results.B = results.A;
    document.getElementById('abSummary').style.display = 'none';
  }
  
  showPage('results');
  renderResults();
  saveInputs();
}

// حساب المدار اليدوي
function calcRotated() {
  const scale = parseFloat(document.getElementById('manScale').value);
  const rot = parseFloat(document.getElementById('manRot').value);
  if (isNaN(scale) || isNaN(rot)) return;
  
  const refIdx = document.getElementById('starM').value || document.getElementById('starA').value || 0;
  const ref = STARS[refIdx];
  const tRef = transform(ref.x, ref.y, scale, rot);
  
  rotResults = STARS.map(s => {
    const t = transform(s.x, s.y, scale, rot);
    return {
      name: s.name,
      row: s.row,
      fixed: s.fixed,
      dist: distance(tRef.x, tRef.y, t.x, t.y),
      bear: bearing(tRef.x, tRef.y, t.x, t.y)
    };
  });
  
  renderRotResults();
}

// الدوال الرياضية
function distance(x1, y1, x2, y2) {
  return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
}

function bearing(x1, y1, x2, y2) {
  let angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
  return (90 - angle + 360) % 360;
}

function transform(x, y, scale, rot) {
  const r = rot * Math.PI / 180;
  const tx = x * scale;
  const ty = y * scale;
  return {
    x: tx * Math.cos(r) - ty * Math.sin(r),
    y: tx * Math.sin(r) + ty * Math.cos(r)
  };
}

// عرض النتائج مع الترتيب
function renderResults() {
  const tab = document.querySelector('#page-results .res-tab.active').textContent.includes('المركز') ? 'center' :
              document.querySelector('#page-results .res-tab.active').textContent.includes('أ') ? 'A' : 'B';
  
  let data = results[tab] || [];
  
  // ترتيب
  data.sort((a, b) => {
    if (currentSort.field === 'name') {
      return currentSort.dir === 'asc' ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name);
    } else if (currentSort.field === 'row') {
      return currentSort.dir === 'asc' ? a.row - b.row : b.row - a.row;
    } else {
      return currentSort.dir === 'asc' ? a[currentSort.field] - b[currentSort.field] : b[currentSort.field] - a[currentSort.field];
    }
  });
  
  const html = data.map(r => `
    <div class="res-row ${r.fixed ? 'fixed' : ''}">
      <div class="rnum">${r.row}</div>
      <div class="rname">${r.name}</div>
      <div class="rdist">${r.dist.toFixed(3)}</div>
      <div class="rbear">${r.bear.toFixed(1)}°</div>
    </div>
  `).join('');
  
  document.getElementById('resultsTable').innerHTML = html || '<div class="no-data">لا توجد نتائج</div>';
}

function renderRotResults() {
  rotResults.sort((a, b) => {
    if (rotSort.field === 'name') {
      return rotSort.dir === 'asc' ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name);
    } else if (rotSort.field === 'row') {
      return rotSort.dir === 'asc' ? a.row - b.row : b.row - a.row;
    } else {
      return rotSort.dir === 'asc' ? a[rotSort.field] - b[rotSort.field] : b[rotSort.field] - a[rotSort.field];
    }
  });
  
  const html = rotResults.map(r => `
    <div class="res-row ${r.fixed ? 'fixed' : ''}">
      <div class="rnum">${r.row}</div>
      <div class="rname">${r.name}</div>
      <div class="rdist">${r.dist.toFixed(3)}</div>
      <div class="rbear">${r.bear.toFixed(1)}°</div>
    </div>
  `).join('');
  
  document.getElementById('rotTable').innerHTML = html || '<div class="no-data">احسب المدار أولاً</div>';
}

// وظائف الترتيب
function sortTable(field) {
  if (currentSort.field === field) {
    currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    currentSort.field = field;
    currentSort.dir = 'asc';
  }
  renderResults();
}

function sortRotTable(field) {
  if (rotSort.field === field) {
    rotSort.dir = rotSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    rotSort.field = field;
    rotSort.dir = 'asc';
  }
  renderRotResults();
}

// تغيير التبويب في صفحة النتائج
function setResTab(tab) {
  document.querySelectorAll('#page-results .res-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderResults();
}

// عرض الصفحة
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  if (page === 'input') document.querySelectorAll('.nav-btn')[0].classList.add('active');
  else if (page === 'results') document.querySelectorAll('.nav-btn')[1].classList.add('active');
  else if (page === 'rotated') document.querySelectorAll('.nav-btn')[2].classList.add('active');
}

function showError(msg) {
  const err = document.getElementById('errorMsg');
  err.textContent = msg;
  err.style.display = 'block';
}

function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}
</script>
