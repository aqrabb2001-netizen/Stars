<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback,useReducer} = React;

// ══════════════════════════════════════════
// FILTER ENGINE
// ══════════════════════════════════════════
const clamp = v=>Math.max(0,Math.min(255,v));
const gray  = (r,g,b)=>0.299*r+0.587*g+0.114*b;

const COLORMAPS = {
  inferno:(t)=>{
    const c=[[0,0,4],[40,11,84],[101,21,110],[159,42,99],[212,72,66],[245,125,21],[250,193,39],[252,255,164]];
    const i=Math.min(Math.floor(t*7),6),f=t*7-i,a=c[i],b=c[i+1];
    return [a[0]+(b[0]-a[0])*f,a[1]+(b[1]-a[1])*f,a[2]+(b[2]-a[2])*f];
  },
  hot:(t)=>t<0.333?[t*3*255,0,0]:t<0.667?[255,(t-0.333)*3*255,0]:[255,255,(t-0.667)*3*255],
  bone:(t)=>[t*255*0.9,t*255*0.85,t*255*0.95],
  ocean:(t)=>[0,t*180,t*255],
  jet:(t)=>{
    const r=t<0.35?0:t<0.66?((t-0.35)/0.31)*255:t<0.9?255:(1-t)/0.1*255;
    const g=t<0.125?0:t<0.375?((t-0.125)/0.25)*255:t<0.64?255:t<0.91?((0.91-t)/0.27)*255:0;
    const b=t<0.11?((t+0.125)/0.25)*255:t<0.375?255:t<0.64?((0.64-t)/0.265)*255:0;
    return [r,g,b];
  }
};

function applyFilter(src,filterId,params={}){
  const dst=document.createElement("canvas");
  dst.width=src.width;dst.height=src.height;
  const ctx=dst.getContext("2d");
  ctx.drawImage(src,0,0);
  const id=ctx.getImageData(0,0,dst.width,dst.height);
  const d=id.data,W=dst.width,H=dst.height;
  const getG=(x,y)=>{const i=(y*W+x)*4;return gray(d[i],d[i+1],d[i+2]);};

  switch(filterId){
    case "clahe":{
      const bins=256,limit=(params.clipLimit||8)*W*H/bins;
      const hist=new Array(bins).fill(0);
      for(let i=0;i<d.length;i+=4)hist[Math.round(gray(d[i],d[i+1],d[i+2]))]++;
      let excess=0;for(let b=0;b<bins;b++)if(hist[b]>limit){excess+=hist[b]-limit;hist[b]=limit;}
      const add=Math.floor(excess/bins);for(let b=0;b<bins;b++)hist[b]+=add;
      const cdf=new Array(bins).fill(0);cdf[0]=hist[0];
      for(let b=1;b<bins;b++)cdf[b]=cdf[b-1]+hist[b];
      const mn=cdf.find(v=>v>0),scale=255/(cdf[bins-1]-mn);
      for(let i=0;i<d.length;i+=4){
        const v=clamp(Math.round((cdf[Math.round(gray(d[i],d[i+1],d[i+2]))]-mn)*scale));
        d[i]=d[i+1]=d[i+2]=v;
      }
      break;
    }
    case "dog":{
      const s1=params.s1||1,s2=params.s2||8;
      const mkBlur=s=>{const r=Math.ceil(s*2);const k=[];let sum=0;for(let i=-r;i<=r;i++){const v=Math.exp(-i*i/(2*s*s));k.push(v);sum+=v;}return k.map(v=>v/sum);};
      const k1=mkBlur(s1),k2=mkBlur(s2);
      const gs=new Float32Array(W*H);
      for(let y=0;y<H;y++)for(let x=0;x<W;x++)gs[y*W+x]=getG(x,y);
      const doBlur=(k)=>{
        const r=Math.floor(k.length/2),tmp=new Float32Array(W*H),out=new Float32Array(W*H);
        for(let y=0;y<H;y++)for(let x=0;x<W;x++){let s=0;for(let i=-r;i<=r;i++)s+=gs[y*W+Math.max(0,Math.min(W-1,x+i))]*k[i+r];tmp[y*W+x]=s;}
        for(let y=0;y<H;y++)for(let x=0;x<W;x++){let s=0;for(let i=-r;i<=r;i++)s+=tmp[Math.max(0,Math.min(H-1,y+i))*W+x]*k[i+r];out[y*W+x]=s;}
        return out;
      };
      const b1=doBlur(k1),b2=doBlur(k2);
      let mn=Infinity,mx=-Infinity;
      for(let i=0;i<W*H;i++){const v=b1[i]-b2[i];if(v<mn)mn=v;if(v>mx)mx=v;}
      const rng=mx-mn||1;
      for(let y=0;y<H;y++)for(let x=0;x<W;x++){
        const v=clamp(Math.round(((b1[y*W+x]-b2[y*W+x])-mn)/rng*255));
        const i=(y*W+x)*4;d[i]=d[i+1]=d[i+2]=v;
      }
      break;
    }
    case "emboss":{
      const s=ctx.getImageData(0,0,W,H).data,k=[-2,-1,0,-1,1,1,0,1,2];
      for(let y=1;y<H-1;y++)for(let x=1;x<W-1;x++){
        let v=128;
        for(let ky=-1;ky<=1;ky++)for(let kx=-1;kx<=1;kx++){
          const idx=((y+ky)*W+(x+kx))*4;v+=gray(s[idx],s[idx+1],s[idx+2])*k[(ky+1)*3+(kx+1)];
        }
        const i=(y*W+x)*4;d[i]=d[i+1]=d[i+2]=clamp(v*(params.strength||2.5)-60);
      }
      break;
    }
    case "raking":{
      const ang=params.angle||45,s=ctx.getImageData(0,0,W,H).data;
      const a=ang*Math.PI/180,kx=Math.cos(a),ky=Math.sin(a);
      const kern=[[-kx-ky,-ky,kx-ky],[-kx,2,kx],[-kx+ky,ky,kx+ky]];
      for(let y=1;y<H-1;y++)for(let x=1;x<W-1;x++){
        let v=128;
        for(let r=-1;r<=1;r++)for(let c=-1;c<=1;c++){
          const idx=((y+r)*W+(x+c))*4;v+=gray(s[idx],s[idx+1],s[idx+2])*kern[r+1][c+1];
        }
        const i=(y*W+x)*4;d[i]=d[i+1]=d[i+2]=clamp(v*(params.strength||3)-80);
      }
      break;
    }
    case "unsharp":{
      const s=ctx.getImageData(0,0,W,H).data,alpha=params.alpha||4;
      const bl=new Float32Array(W*H);
      for(let y=0;y<H;y++)for(let x=0;x<W;x++){
        let sum=0,cnt=0;
        for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++){
          const ny=Math.max(0,Math.min(H-1,y+dy)),nx=Math.max(0,Math.min(W-1,x+dx));
          sum+=gray(s[(ny*W+nx)*4],s[(ny*W+nx)*4+1],s[(ny*W+nx)*4+2]);cnt++;
        }
        bl[y*W+x]=sum/cnt;
      }
      for(let y=0;y<H;y++)for(let x=0;x<W;x++){
        const g=gray(s[(y*W+x)*4],s[(y*W+x)*4+1],s[(y*W+x)*4+2]);
        const v=clamp(Math.round(g*alpha-bl[y*W+x]*(alpha-1)));
        const i=(y*W+x)*4;d[i]=d[i+1]=d[i+2]=v;
      }
      break;
    }
    case "colormap":{
      const fn=COLORMAPS[params.map||"inferno"],inv=params.invert!==false;
      for(let i=0;i<d.length;i+=4){
        const t=inv?1-gray(d[i],d[i+1],d[i+2])/255:gray(d[i],d[i+1],d[i+2])/255;
        const [r,g,b]=fn(Math.max(0,Math.min(1,t)));
        d[i]=clamp(r);d[i+1]=clamp(g);d[i+2]=clamp(b);
      }
      break;
    }
    case "invert":for(let i=0;i<d.length;i+=4){d[i]=255-d[i];d[i+1]=255-d[i+1];d[i+2]=255-d[i+2];}break;
    case "flip":
      if(params.axis==="h"){
        for(let y=0;y<H;y++)for(let x=0;x<W/2;x++){
          const a=(y*W+x)*4,b=(y*W+(W-1-x))*4;
          for(let k=0;k<4;k++){const t=d[a+k];d[a+k]=d[b+k];d[b+k]=t;}
        }
      }else{
        for(let y=0;y<H/2;y++)for(let x=0;x<W;x++){
          const a=(y*W+x)*4,b=((H-1-y)*W+x)*4;
          for(let k=0;k<4;k++){const t=d[a+k];d[a+k]=d[b+k];d[b+k]=t;}
        }
      }
      break;
    case "lab_a":
      for(let i=0;i<d.length;i+=4){const v=clamp(Math.round(((d[i]/255-d[i+1]/255)*127)+128));d[i]=d[i+1]=d[i+2]=v;}break;
    case "lab_b":
      for(let i=0;i<d.length;i+=4){const v=clamp(Math.round(((d[i+1]/255-d[i+2]/255)*127)+128));d[i]=d[i+1]=d[i+2]=v;}break;
    case "threshold":
      for(let i=0;i<d.length;i+=4){const v=gray(d[i],d[i+1],d[i+2])>(params.threshold||128)?255:0;d[i]=d[i+1]=d[i+2]=v;}break;
    case "grayscale":
      for(let i=0;i<d.length;i+=4){const v=gray(d[i],d[i+1],d[i+2]);d[i]=d[i+1]=d[i+2]=v;}break;
    case "gamma":{
      const lut=new Uint8Array(256),g=params.gamma||1;
      for(let i=0;i<256;i++)lut[i]=clamp(Math.round(Math.pow(i/255,1/g)*255));
      for(let i=0;i<d.length;i+=4){d[i]=lut[d[i]];d[i+1]=lut[d[i+1]];d[i+2]=lut[d[i+2]];}break;
    }
  }
  ctx.putImageData(id,0,0);return dst;
}

function runPipeline(src,pipeline){
  let c=src;
  for(const s of pipeline)if(s.enabled)c=applyFilter(c,s.filter,s.params||{});
  return c;
}

// ══════════════════════════════════════════
// DATA
// ══════════════════════════════════════════
const RECIPES=[
  {id:"r1",name:"كشف التدخل البشري",icon:"◈",pipeline:[{filter:"clahe",params:{clipLimit:12}},{filter:"colormap",params:{map:"inferno",invert:true}}]},
  {id:"r2",name:"الشكل الكلي DoG",icon:"◉",pipeline:[{filter:"clahe"},{filter:"dog",params:{s1:1,s2:12}}]},
  {id:"r3",name:"Raking + Inferno",icon:"☀",pipeline:[{filter:"clahe"},{filter:"raking",params:{angle:45,strength:3}},{filter:"colormap",params:{map:"inferno",invert:true}}]},
  {id:"r4",name:"LAB_A + Unsharp",icon:"◑",pipeline:[{filter:"lab_a"},{filter:"unsharp",params:{alpha:4}}]},
  {id:"r5",name:"عكس + DoG",icon:"↺",pipeline:[{filter:"invert"},{filter:"clahe"},{filter:"dog",params:{s1:1,s2:8}}]},
  {id:"r6",name:"Emboss HOT",icon:"▲",pipeline:[{filter:"clahe"},{filter:"emboss",params:{strength:3}},{filter:"colormap",params:{map:"hot",invert:true}}]},
  {id:"r7",name:"كشف الحفر BONE",icon:"◆",pipeline:[{filter:"clahe"},{filter:"colormap",params:{map:"bone",invert:true}}]},
  {id:"r8",name:"Gamma + Raking",icon:"◐",pipeline:[{filter:"gamma",params:{gamma:0.4}},{filter:"raking",params:{angle:90,strength:3.5}}]},
];

const FILTERS=[
  {id:"clahe",label:"CLAHE",icon:"◈",params:{clipLimit:{type:"range",min:1,max:20,default:12}}},
  {id:"dog",label:"DoG",icon:"◉",params:{s1:{type:"range",min:0.5,max:3,step:0.5,default:1},s2:{type:"range",min:2,max:15,default:8}}},
  {id:"emboss",label:"Emboss",icon:"▲",params:{strength:{type:"range",min:1,max:5,step:0.5,default:2.5}}},
  {id:"raking",label:"Raking",icon:"☀",params:{angle:{type:"range",min:0,max:180,default:45},strength:{type:"range",min:1,max:5,step:0.5,default:3}}},
  {id:"unsharp",label:"Unsharp",icon:"✦",params:{alpha:{type:"range",min:1,max:6,step:0.5,default:4}}},
  {id:"colormap",label:"Colormap",icon:"🌡",params:{map:{type:"select",options:["inferno","hot","bone","ocean","jet"],default:"inferno"},invert:{type:"bool",default:true}}},
  {id:"invert",label:"عكس",icon:"↺",params:{}},
  {id:"flip",label:"قلب",icon:"↔",params:{axis:{type:"select",options:["h","v"],default:"h"}}},
  {id:"lab_a",label:"LAB A",icon:"◑",params:{}},
  {id:"lab_b",label:"LAB B",icon:"◐",params:{}},
  {id:"threshold",label:"Threshold",icon:"▪",params:{threshold:{type:"range",min:50,max:200,default:128}}},
  {id:"grayscale",label:"رمادي",icon:"▣",params:{}},
  {id:"gamma",label:"Gamma",icon:"◆",params:{gamma:{type:"range",min:0.1,max:3,step:0.1,default:1}}},
];

const initState={
  images:[],activeImageId:null,pipeline:[],findings:[],
  comparePair:[],aiPhases:{p1:null,p2:null,p3:null},
  aiLoading:false,activeTab:"filters",rotation:0,
  showOriginal:false,activeRecipe:null
};

function reducer(s,a){
  switch(a.type){
    case "ADD_IMAGE":return{...s,images:[...s.images,a.img],activeImageId:a.img.id};
    case "SET_ACTIVE":return{...s,activeImageId:a.id,aiPhases:{p1:null,p2:null,p3:null}};
    case "SET_PIPELINE":return{...s,pipeline:a.pipeline};
    case "ADD_STEP":return{...s,pipeline:[...s.pipeline,a.step]};
    case "REMOVE_STEP":return{...s,pipeline:s.pipeline.filter((_,i)=>i!==a.index)};
    case "TOGGLE_STEP":return{...s,pipeline:s.pipeline.map((x,i)=>i===a.index?{...x,enabled:!x.enabled}:x)};
    case "UPDATE_PARAM":return{...s,pipeline:s.pipeline.map((x,i)=>i===a.index?{...x,params:{...x.params,[a.key]:a.val}}:x)};
    case "SET_ROT":return{...s,rotation:a.r};
    case "SET_AI":return{...s,aiPhases:{...s.aiPhases,[a.phase]:a.data}};
    case "SET_AI_LOAD":return{...s,aiLoading:a.v};
    case "ADD_FINDING":return{...s,findings:[...s.findings,a.f]};
    case "REMOVE_FINDING":return{...s,findings:s.findings.filter(f=>f.id!==a.id)};
    case "SET_TAB":return{...s,activeTab:a.tab};
    case "SET_COMPARE":return{...s,comparePair:a.pair};
    case "LOAD_RECIPE":return{...s,pipeline:a.pipeline,activeRecipe:a.id};
    case "TOGGLE_ORIG":return{...s,showOriginal:!s.showOriginal};
    default:return s;
  }
}

// ══════════════════════════════════════════
// FILTER STEP COMPONENT
// ══════════════════════════════════════════
function FilterStep({step,index,dispatch}){
  const def=FILTERS.find(f=>f.id===step.filter);
  if(!def)return null;
  return(
    <div style={{background:step.enabled?"#1a1810":"#0f0c08",border:`1px solid ${step.enabled?"#3a3020":"#1a1510"}`,borderRadius:6,padding:"7px 9px",marginBottom:4,opacity:step.enabled?1:0.5}}>
      <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:Object.keys(def.params).length?5:0}}>
        <span style={{fontSize:11}}>{def.icon}</span>
        <span style={{fontSize:11,color:"#c4a87a",flex:1}}>{def.label}</span>
        <button onClick={()=>dispatch({type:"TOGGLE_STEP",index})} style={{background:"none",color:step.enabled?"#4a8a4a":"#4a3c28",fontSize:10}}>
          {step.enabled?"✓":"○"}
        </button>
        <button onClick={()=>dispatch({type:"REMOVE_STEP",index})} style={{background:"none",color:"#5a3020",fontSize:10}}>✕</button>
      </div>
      {Object.entries(def.params).map(([key,cfg])=>(
        <div key={key} style={{marginBottom:3}}>
          {cfg.type==="range"&&<>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#4a3c28",marginBottom:1}}>
              <span>{key}</span><span style={{color:"#c4a87a"}}>{step.params[key]??cfg.default}</span>
            </div>
            <input type="range" min={cfg.min} max={cfg.max} step={cfg.step||1}
              value={step.params[key]??cfg.default}
              onChange={e=>dispatch({type:"UPDATE_PARAM",index,key,val:Number(e.target.value)})}/>
          </>}
          {cfg.type==="select"&&
            <select value={step.params[key]??cfg.default}
              onChange={e=>dispatch({type:"UPDATE_PARAM",index,key,val:e.target.value})}
              style={{fontSize:10,padding:"2px 4px"}}>
              {cfg.options.map(o=><option key={o}>{o}</option>)}
            </select>}
          {cfg.type==="bool"&&
            <label style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"#8a7060",cursor:"pointer"}}>
              <input type="checkbox" checked={step.params[key]??cfg.default}
                onChange={e=>dispatch({type:"UPDATE_PARAM",index,key,val:e.target.checked})}/>
              {key}
            </label>}
        </div>
      ))}
    </div>
  );
}

// ══════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════
function App(){
  const [st,dispatch]=useReducer(reducer,initState);
  const fileRef=useRef(),canvasRef=useRef(),overlayRef=useRef();
  const compareRef1=useRef(),compareRef2=useRef(),chatEndRef=useRef();

  const [apiKey,setApiKey]=useState(()=>localStorage.getItem("fva_key")||"");
  const [showKeyInput,setShowKeyInput]=useState(false);
  const [zoom,setZoom]=useState(1);
  const [selMode,setSelMode]=useState(false);
  const [selRect,setSelRect]=useState(null);
  const [selStart,setSelStart]=useState(null);
  const [findingLabel,setFindingLabel]=useState("");
  const [showChat,setShowChat]=useState(false);
  const [chatMsgs,setChatMsgs]=useState([{role:"assistant",content:"مرحباً — أنا جاهز لمناقشة أي صورة ترفعها. طبّق الفلاتر ثم اسألني."}]);
  const [chatIn,setChatIn]=useState("");
  const [chatLoading,setChatLoading]=useState(false);
  const [compareMode,setCompareMode]=useState("overlay");
  const [compareOpacity,setCompareOpacity]=useState(0.5);
  const [blinkSt,setBlinkSt]=useState(0);
  const [rotation,setRotation]=useState(0);

  const activeImg=st.images.find(i=>i.id===st.activeImageId);

  // Save API key
  useEffect(()=>{ if(apiKey)localStorage.setItem("fva_key",apiKey); },[apiKey]);

  // Blink
  useEffect(()=>{
    if(compareMode!=="blink"||st.comparePair.length<2)return;
    const t=setInterval(()=>setBlinkSt(s=>(s+1)%2),800);
    return()=>clearInterval(t);
  },[compareMode,st.comparePair]);

  // Scroll chat
  useEffect(()=>chatEndRef.current?.scrollIntoView({behavior:"smooth"}),[chatMsgs]);

  // Draw main canvas
  useEffect(()=>{
    if(!activeImg||!canvasRef.current)return;
    const src=st.showOriginal?activeImg.canvas:runPipeline(activeImg.canvas,st.pipeline);
    const rad=rotation*Math.PI/180,cos=Math.abs(Math.cos(rad)),sin=Math.abs(Math.sin(rad));
    const nw=Math.round(src.width*cos+src.height*sin),nh=Math.round(src.height*cos+src.width*sin);
    const dc=canvasRef.current;dc.width=nw;dc.height=nh;
    const ctx=dc.getContext("2d");
    ctx.translate(nw/2,nh/2);ctx.rotate(rad);ctx.drawImage(src,-src.width/2,-src.height/2);
    ctx.setTransform(1,0,0,1,0,0);
    if(overlayRef.current){
      const ov=overlayRef.current;ov.width=nw;ov.height=nh;
      const oc=ov.getContext("2d");oc.clearRect(0,0,nw,nh);
      const COLORS={وجه:"#ff4444",جسم:"#ff9900",رمز:"#aa44ff",نقش:"#44aaff",نمط:"#ffdd00",أخرى:"#aaaaaa"};
      st.findings.filter(f=>f.imageId===st.activeImageId).forEach(f=>{
        const c=COLORS[f.type]||"#aaa";
        oc.strokeStyle=c;oc.lineWidth=2;oc.setLineDash([5,3]);
        oc.strokeRect(f.x,f.y,f.w,f.h);
        oc.fillStyle="rgba(0,0,0,0.75)";oc.fillRect(f.x,f.y-18,Math.min(f.w,130),18);
        oc.fillStyle=c;oc.font="11px monospace";oc.fillText(`${f.label}`,f.x+3,f.y-4);
      });
      if(selRect){
        oc.strokeStyle="#f0c040";oc.lineWidth=2;oc.setLineDash([4,2]);
        oc.strokeRect(selRect.x,selRect.y,selRect.w,selRect.h);
      }
    }
  },[activeImg,st.pipeline,st.showOriginal,st.findings,st.activeImageId,rotation,selRect]);

  // Draw compare
  useEffect(()=>{
    if(st.comparePair.length<2||!compareRef1.current||!compareRef2.current)return;
    const i1=st.images.find(i=>i.id===st.comparePair[0]);
    const i2=st.images.find(i=>i.id===st.comparePair[1]);
    if(!i1||!i2)return;
    const c1=runPipeline(i1.canvas,st.pipeline);
    const c2=runPipeline(i2.canvas,st.pipeline);
    const r1=compareRef1.current;r1.width=c1.width;r1.height=c1.height;
    r1.getContext("2d").drawImage(c1,0,0);
    const r2=compareRef2.current;r2.width=c2.width;r2.height=c2.height;
    const ctx2=r2.getContext("2d");
    if(compareMode==="overlay"){
      ctx2.drawImage(c1,0,0,c2.width,c2.height);
      ctx2.globalAlpha=compareOpacity;ctx2.drawImage(c2,0,0);ctx2.globalAlpha=1;
    }else if(compareMode==="blink"){
      ctx2.drawImage(blinkSt===0?c1:c2,0,0,c2.width,c2.height);
    }else{
      ctx2.drawImage(c2,0,0);
    }
  },[st.comparePair,st.images,st.pipeline,compareMode,compareOpacity,blinkSt]);

  const loadFile=useCallback((file)=>{
    if(!file||!file.type.startsWith("image/"))return;
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement("canvas");
        c.width=img.naturalWidth;c.height=img.naturalHeight;
        c.getContext("2d").drawImage(img,0,0);
        dispatch({type:"ADD_IMAGE",img:{id:Date.now().toString(),name:file.name,src:e.target.result,canvas:c}});
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  },[]);

  const getB64=()=>{
    if(!canvasRef.current)return null;
    const tmp=document.createElement("canvas");
    tmp.width=Math.min(canvasRef.current.width,850);
    tmp.height=Math.round(canvasRef.current.height*(tmp.width/canvasRef.current.width));
    tmp.getContext("2d").drawImage(canvasRef.current,0,0,tmp.width,tmp.height);
    return tmp.toDataURL("image/jpeg",0.82).split(",")[1];
  };

  const callAPI=async(system,text,b64=null)=>{
    const content=[];
    if(b64)content.push({type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}});
    content.push({type:"text",text});
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system,messages:[{role:"user",content}]})
    });
    const data=await resp.json();
    if(data.error)throw new Error(data.error.message);
    return data.content?.map(b=>b.text||"").join("")||"";
  };

  const runAI=async()=>{
    if(!activeImg||!apiKey)return alert("أدخل مفتاح API أولاً");
    dispatch({type:"SET_AI_LOAD",v:true});
    const b64=getB64();
    try{
      const p1Text=await callAPI(
        "أنت محلل جنائي بصري. أجب بـ JSON فقط بدون أي نص خارجه.",
        `المرحلة 1 — الشكل الكلي فقط. لا تسمّ المادة. صف الأشكال الهندسية فقط.
JSON: {"overall_shape":"وصف","dominant_forms":["شكل1"],"anomaly_hint":"أغرب شيء","confidence":80}`,b64);
      const p1=JSON.parse(p1Text.replace(/```json|```/g,"").trim());
      dispatch({type:"SET_AI",phase:"p1",data:p1});

      const p2Text=await callAPI(
        "أنت محلل جنائي بصري. أجب بـ JSON فقط.",
        `المرحلة 2 — ابحث عن تدخل بشري. السياق: ${JSON.stringify(p1)}
لا تقل "طبيعي بسبب المادة". برر بالشكل فقط.
JSON: {"findings":[{"type":"نوع","location":"موقع","confidence":75,"description":"وصف"}],"strongest":"أقوى اكتشاف","camouflage_likely":true}`,b64);
      const p2=JSON.parse(p2Text.replace(/```json|```/g,"").trim());
      dispatch({type:"SET_AI",phase:"p2",data:p2});

      const p3Text=await callAPI(
        "أنت محلل جنائي بصري. أجب بـ JSON فقط.",
        `المرحلة 3 — الحكم النهائي. ${JSON.stringify({p1,p2})}
JSON: {"material":"المادة","verdict":"طبيعي أو محتمل أو مؤكد","confidence":80,"top_matches":[{"label":"اسم","score":75}],"summary":"خلاصة موجزة","action":"ما يجب فعله للتأكيد"}`,b64);
      const p3=JSON.parse(p3Text.replace(/```json|```/g,"").trim());
      dispatch({type:"SET_AI",phase:"p3",data:p3});
    }catch(e){alert("خطأ: "+e.message);}
    dispatch({type:"SET_AI_LOAD",v:false});
  };

  const sendChat=async()=>{
    if(!chatIn.trim()||chatLoading||!apiKey)return;
    const msg=chatIn.trim();setChatIn("");
    setChatMsgs(p=>[...p,{role:"user",content:msg}]);
    setChatLoading(true);
    const b64=getB64();
    const ctx={
      image:activeImg?.name||"لا صورة",
      pipeline:st.pipeline.filter(s=>s.enabled).map(s=>s.filter).join(" → ")||"لا فلاتر",
      findings:st.findings.filter(f=>f.imageId===st.activeImageId).map(f=>f.label),
      ai:st.aiPhases
    };
    const history=chatMsgs.slice(-8).map(m=>({
      role:m.role,
      content:m.role==="assistant"?m.content:[{type:"text",text:m.content}]
    }));
    const content=[];
    if(b64)content.push({type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}});
    content.push({type:"text",text:msg});
    history.push({role:"user",content});
    try{
      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:1000,
          system:`أنت محلل جنائي بصري خبير. سياق الجلسة: ${JSON.stringify(ctx)}. أجب بصدق وموضوعية على ما تراه في الصورة.`,
          messages:history
        })
      });
      const data=await resp.json();
      const reply=data.content?.map(b=>b.text||"").join("")||"خطأ.";
      setChatMsgs(p=>[...p,{role:"assistant",content:reply}]);
    }catch(e){setChatMsgs(p=>[...p,{role:"assistant",content:"خطأ في الاتصال."}]);}
    setChatLoading(false);
  };

  const onMouseDown=e=>{
    if(!selMode||!canvasRef.current)return;
    const r=canvasRef.current.getBoundingClientRect();
    setSelStart({x:(e.clientX-r.left)/zoom,y:(e.clientY-r.top)/zoom});
    setSelRect(null);
  };
  const onMouseMove=e=>{
    if(!selMode||!selStart||!canvasRef.current)return;
    const r=canvasRef.current.getBoundingClientRect();
    const x=(e.clientX-r.left)/zoom,y=(e.clientY-r.top)/zoom;
    setSelRect({x:Math.min(selStart.x,x),y:Math.min(selStart.y,y),w:Math.abs(x-selStart.x),h:Math.abs(y-selStart.y)});
  };
  const onMouseUp=()=>setSelStart(null);

  const addFinding=()=>{
    if(!selRect||!findingLabel)return;
    dispatch({type:"ADD_FINDING",f:{id:Date.now().toString(),imageId:st.activeImageId,x:selRect.x,y:selRect.y,w:selRect.w,h:selRect.h,label:findingLabel,type:"أخرى"}});
    setSelRect(null);setFindingLabel("");
  };

  const verdictColor=v=>v==="مؤكد"?"#e87a5a":v==="محتمل"?"#e8c97a":"#7eb87e";
  const S=(obj)=>Object.entries(obj).map(([k,v])=>`${k}:${v}`).join(";"); // style shorthand unused here

  return(
    <div style={{display:"flex",height:"100vh",background:"#080604",color:"#c8b090",fontFamily:"Georgia,serif",direction:"rtl",overflow:"hidden",fontSize:13}}>

      {/* ══ RIGHT PANEL ══ */}
      <div style={{width:260,display:"flex",flexDirection:"column",background:"#0b0907",borderLeft:"1px solid #1a1510",flexShrink:0,overflow:"hidden"}}>

            <div style={{fontSize:8,color:"#3a3020",marginTop:3}}>
              من console.anthropic.com — يُحفظ تلقائياً
            </div>
          </div>}
        </div>

        {/* Image strip */}
        <div style={{padding:"6px 10px",borderBottom:"1px solid #1a1510"}}>
          <div style={{display:"flex",gap:4,overflowX:"auto",paddingBottom:3}}>

              <div key={img.id} onClick={()=>dispatch({type:"SET_ACTIVE",id:img.id})}

                <img src={img.src} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              </div>

            <div onClick={()=>fileRef.current.click()}

          </div>
          <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}}
            onChange={e=>[...e.target.files].forEach(loadFile)}/>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",borderBottom:"1px solid #1a1510",flexShrink:0}}>
          {[["filters","فلاتر"],["ai","AI"],["compare","مقارنة"],["findings","اكتشافات"]].map(([id,lbl])=>(
            <button key={id} onClick={()=>dispatch({type:"SET_TAB",tab:id})} style={{
              flex:1,padding:"7px 2px",fontSize:9,background:st.activeTab===id?"#1a1510":"transparent",
              borderBottom:`2px solid ${st.activeTab===id?"#c4a87a":"transparent"}`,
              color:st.activeTab===id?"#e8d4a0":"#3a3020",border:"none"
            }}>{lbl}</button>
          ))}
        </div>

        {/* Tab content */}
        <div style={{flex:1,overflowY:"auto",padding:"8px 10px"}}>

          {/* FILTERS */}
          {st.activeTab==="filters"&&<>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:8,color:"#3a3020",letterSpacing:"0.1em",marginBottom:5}}>وصفات جاهزة</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3}}>
                {RECIPES.map(r=>(
                  <button key={r.id} onClick={()=>dispatch({type:"LOAD_RECIPE",id:r.id,pipeline:r.pipeline.map((s,i)=>({id:i,enabled:true,...s}))})}
                    style={{padding:"4px 3px",fontSize:9,background:st.activeRecipe===r.id?"#2a1e10":"#0f0c08",
                      border:`1px solid ${st.activeRecipe===r.id?"#c4a87a":"#1a1510"}`,borderRadius:3,
                      color:st.activeRecipe===r.id?"#e8d4a0":"#4a3c28",textAlign:"right",cursor:"pointer"}}>
                    {r.icon} {r.name}
                  </button>
                ))}
              </div>
            </div>

            <div style={{marginBottom:6}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <span style={{fontSize:8,color:"#3a3020",letterSpacing:"0.1em"}}>Pipeline ({st.pipeline.filter(s=>s.enabled).length}/{st.pipeline.length})</span>
                <button onClick={()=>dispatch({type:"SET_PIPELINE",pipeline:[]})} style={{fontSize:9,background:"none",border:"none",color:"#4a2010",cursor:"pointer"}}>مسح</button>
              </div>
              {st.pipeline.map((step,i)=><FilterStep key={step.id||i} step={step} index={i} dispatch={dispatch}/>)}
            </div>

            <div style={{marginBottom:8}}>
              <div style={{fontSize:8,color:"#3a3020",marginBottom:4}}>إضافة فلتر</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3}}>
                {FILTERS.map(f=>(
                  <button key={f.id}
                    onClick={()=>dispatch({type:"ADD_STEP",step:{id:Date.now(),filter:f.id,enabled:true,params:Object.fromEntries(Object.entries(f.params).map(([k,v])=>[k,v.default??v.options?.[0]]))}})}
                    style={{padding:"4px",fontSize:9,background:"#0f0c08",border:"1px solid #1a1510",borderRadius:3,color:"#4a3c28",textAlign:"right",cursor:"pointer"}}>
                    {f.icon} {f.label}
                  </button>
                ))}
              </div>
            </div>

            <div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:8,color:"#3a3020",marginBottom:3}}>
                <span>تدوير</span><span style={{color:"#c4a87a"}}>{rotation}°</span>
              </div>
              <input type="range" min="-180" max="180" value={rotation} onChange={e=>setRotation(Number(e.target.value))}/>
              <div style={{display:"flex",gap:3,marginTop:3}}>
                {[0,90,180,-90].map(r=>(
                  <button key={r} onClick={()=>setRotation(r)}
                    style={{flex:1,padding:"3px",fontSize:9,background:rotation===r?"#2a1e10":"#0f0c08",
                      border:`1px solid ${rotation===r?"#c4a87a":"#1a1510"}`,borderRadius:2,color:"#c4a87a",cursor:"pointer"}}>
                    {r}°
                  </button>
                ))}
              </div>
            </div>
          </>}

          {/* AI */}
          {st.activeTab==="ai"&&<>
            <button onClick={runAI} disabled={!activeImg||st.aiLoading}
              style={{width:"100%",padding:"11px",marginBottom:8,
                background:st.aiLoading?"#1a1510":"linear-gradient(135deg,#3a2810,#5a4020)",
                border:`1px solid ${st.aiLoading?"#2a1510":"#8a6030"}`,borderRadius:7,
                color:st.aiLoading?"#3a3020":"#e8d4a0",fontSize:12,cursor:"pointer"}}>
              {st.aiLoading
                ?<span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  <span style={{width:12,height:12,border:"2px solid #3a3020",borderTopColor:"#c4a87a",borderRadius:"50%",display:"inline-block",animation:"spin 0.8s linear infinite"}}/>
                  تحليل ثلاثي المراحل...
                </span>
                :"◈ تشغيل التحليل AI"}
            </button>
            {[["p1","الشكل الكلي"],["p2","التدخل البشري"],["p3","الحكم النهائي"]].map(([phase,label],ph)=>{
              const data=st.aiPhases[phase];
              return(
                <div key={phase} style={{background:data?"#15120c":"#0f0c08",border:`1px solid ${data?"#3a3020":"#1a1510"}`,borderRadius:6,padding:"7px 9px",marginBottom:5,animation:data?"fadeIn 0.4s":"none"}}>
                  <div style={{fontSize:8,color:data?"#c4a87a":"#2a2010",marginBottom:data?4:0}}>{data?"◈":"○"} {ph+1}. {label}</div>
                  {data&&phase==="p1"&&<div style={{fontSize:10,color:"#8a7060"}}>{data.overall_shape}</div>}
                  {data&&phase==="p2"&&data.findings?.slice(0,3).map((f,i)=>(
                    <div key={i} style={{fontSize:10,color:"#8a7060",marginBottom:2}}>
                      <span style={{color:"#e8c97a"}}>{f.confidence}%</span> {f.type}: {f.description?.slice(0,45)}
                    </div>
                  ))}
                  {data&&phase==="p3"&&<>
                    <div style={{fontSize:13,fontWeight:700,color:verdictColor(data.verdict)}}>{data.verdict}</div>
                    <div style={{fontSize:10,color:"#6a5040",marginTop:3,lineHeight:1.5}}>{data.summary?.slice(0,90)}</div>
                  </>}
                </div>
              );
            })}
          </>}

          {/* COMPARE */}
          {st.activeTab==="compare"&&<>
            <div style={{fontSize:8,color:"#3a3020",marginBottom:5}}>اختر صورتين (اضغط للتحديد)</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:3,marginBottom:8}}>
              {st.images.map(img=>(
                <div key={img.id} onClick={()=>{
                  const p=st.comparePair;
                  if(p.includes(img.id))dispatch({type:"SET_COMPARE",pair:p.filter(i=>i!==img.id)});
                  else if(p.length<2)dispatch({type:"SET_COMPARE",pair:[...p,img.id]});
                  else dispatch({type:"SET_COMPARE",pair:[p[1],img.id]});
                }} style={{borderRadius:3,overflow:"hidden",border:`2px solid ${st.comparePair.includes(img.id)?"#c4a87a":"#1a1510"}`,cursor:"pointer",position:"relative"}}>
                  <img src={img.src} style={{width:"100%",height:36,objectFit:"cover",display:"block"}}/>
                  {st.comparePair.includes(img.id)&&<div style={{position:"absolute",top:1,right:1,background:"#c4a87a",color:"#0a0806",fontSize:8,borderRadius:2,padding:"0 2px"}}>
                    {st.comparePair.indexOf(img.id)+1}
                  </div>}
                </div>
              ))}
            </div>
            {st.comparePair.length===2&&<>
              <div style={{display:"flex",gap:3,marginBottom:6}}>
                {[["overlay","تراكب"],["side","جانبي"],["blink","بلينك"]].map(([m,l])=>(
                  <button key={m} onClick={()=>setCompareMode(m)}
                    style={{flex:1,padding:"4px",fontSize:9,background:compareMode===m?"#2a1e10":"#0f0c08",
                      border:`1px solid ${compareMode===m?"#c4a87a":"#1a1510"}`,borderRadius:3,
                      color:compareMode===m?"#e8d4a0":"#4a3c28",cursor:"pointer"}}>
                    {l}
                  </button>
                ))}
              </div>
              {compareMode==="overlay"&&<>
                <div style={{fontSize:8,color:"#3a3020",marginBottom:2}}>شفافية: {Math.round(compareOpacity*100)}%</div>
                <input type="range" min="0" max="1" step="0.05" value={compareOpacity} onChange={e=>setCompareOpacity(Number(e.target.value))}/>
              </>}
            </>}
          </>}

          {/* FINDINGS */}
          {st.activeTab==="findings"&&<>
            {selRect&&<div style={{marginBottom:8,background:"#15120c",border:"1px solid #2a2010",borderRadius:6,padding:"7px"}}>
              <div style={{fontSize:8,color:"#3a3020",marginBottom:4}}>تسمية الاكتشاف</div>
              <input type="text" value={findingLabel} onChange={e=>setFindingLabel(e.target.value)}
                placeholder="وصف..." style={{marginBottom:4,fontSize:11}}/>
              <button onClick={addFinding} style={{width:"100%",padding:"6px",background:"#2a1e10",border:"1px solid #5a3020",borderRadius:4,color:"#e8c97a",fontSize:11,cursor:"pointer"}}>
                ◈ حفظ
              </button>
            </div>}
            {st.findings.filter(f=>f.imageId===st.activeImageId).map(f=>(
              <div key={f.id} style={{background:"#0f0c08",border:"1px solid #1a1510",borderRadius:5,padding:"6px 8px",marginBottom:4}}>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:11,color:"#c4a87a"}}>{f.label}</span>
                  <button onClick={()=>dispatch({type:"REMOVE_FINDING",id:f.id})} style={{background:"none",border:"none",color:"#4a2010",cursor:"pointer"}}>✕</button>
                </div>
                <div style={{fontSize:9,color:"#3a3020"}}>
                  {Math.round(f.x)},{Math.round(f.y)} — {Math.round(f.w)}×{Math.round(f.h)}px
                </div>
              </div>
            ))}
            {!st.findings.filter(f=>f.imageId===st.activeImageId).length&&(
              <div style={{fontSize:10,color:"#2a2010",textAlign:"center",paddingTop:16}}>
                فعّل "تحديد" ثم ارسم مستطيلاً على الصورة
              </div>
            )}
          </>}

        </div>
      </div>

      {/* ══ MAIN AREA ══ */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>

        {/* Toolbar */}
        <div style={{padding:"5px 10px",borderBottom:"1px solid #1a1510",background:"#0b0907",display:"flex",alignItems:"center",gap:6,flexShrink:0,flexWrap:"wrap"}}>
          <button onClick={()=>dispatch({type:"TOGGLE_ORIG"})}
            style={{padding:"3px 7px",fontSize:9,background:st.showOriginal?"#2a1810":"transparent",border:`1px solid ${st.showOriginal?"#c4a87a":"#1a1510"}`,borderRadius:3,color:"#c4a87a",cursor:"pointer"}}>
            {st.showOriginal?"◎ أصلي":"◎ معالج"}
          </button>
          <button onClick={()=>setSelMode(!selMode)}
            style={{padding:"3px 7px",fontSize:9,background:selMode?"#1a1008":"transparent",border:`1px solid ${selMode?"#e8a84a":"#1a1510"}`,borderRadius:3,color:selMode?"#e8c97a":"#4a3c28",cursor:"pointer"}}>
            {selMode?"⬡ نشط":"⬡ تحديد"}
          </button>
          <button onClick={()=>setShowChat(s=>!s)}
            style={{padding:"3px 7px",fontSize:9,background:showChat?"#1a2810":"transparent",border:`1px solid ${showChat?"#4a8a4a":"#1a1510"}`,borderRadius:3,color:showChat?"#7eb87e":"#3a3020",cursor:"pointer"}}>
            {showChat?"✕ محادثة":"◈ محادثة"}
          </button>
          <div style={{marginRight:"auto",display:"flex",gap:3}}>
            {[0.5,1,1.5,2].map(z=>(
              <button key={z} onClick={()=>setZoom(z)}
                style={{padding:"2px 5px",fontSize:9,background:zoom===z?"#2a1e10":"transparent",border:`1px solid ${zoom===z?"#c4a87a":"#1a1510"}`,borderRadius:2,color:"#c4a87a",cursor:"pointer"}}>
                {z}x
              </button>
            ))}
          </div>
        </div>

        {/* Canvas + Chat row */}
        <div style={{flex:1,display:"flex",overflow:"hidden"}}>

          {/* Canvas area */}
          {st.activeTab==="compare"&&st.comparePair.length===2
            ?<div style={{flex:1,overflow:"auto",background:"#040302",padding:10,display:"flex",gap:8,alignItems:"flex-start",justifyContent:"center"}}>
              {compareMode==="side"
                ?<>
                  <div style={{flex:1}}><div style={{fontSize:8,color:"#3a3020",marginBottom:3,textAlign:"center"}}>صورة 1</div><canvas ref={compareRef1} style={{display:"block",maxWidth:"100%",borderRadius:3,boxShadow:"0 4px 20px #000"}}/></div>
                  <div style={{flex:1}}><div style={{fontSize:8,color:"#3a3020",marginBottom:3,textAlign:"center"}}>صورة 2</div><canvas ref={compareRef2} style={{display:"block",maxWidth:"100%",borderRadius:3,boxShadow:"0 4px 20px #000"}}/></div>
                </>
                :<div style={{position:"relative"}}>
                  <canvas ref={compareRef1} style={{display:"none"}}/>
                  <canvas ref={compareRef2} style={{display:"block",maxHeight:"calc(100vh - 120px)",borderRadius:3,boxShadow:"0 4px 20px #000"}}/>
                  {compareMode==="blink"&&<div style={{position:"absolute",top:6,left:6,background:"rgba(0,0,0,0.8)",padding:"2px 6px",borderRadius:3,fontSize:9,color:"#c4a87a"}}>صورة {blinkSt+1}</div>}
                </div>}
            </div>
            :<div style={{flex:1,overflow:"auto",background:"#040302",
                backgroundImage:"radial-gradient(circle,#0e0b06 1px,transparent 1px)",backgroundSize:"14px 14px",
                position:"relative",cursor:selMode?"crosshair":"default"}}
                onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}>
              {!activeImg
                ?<div onClick={()=>fileRef.current.click()}
                  style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:8,cursor:"pointer"}}>
                  <div style={{fontSize:52,opacity:0.05}}>◈</div>
                  <div style={{color:"#1a1510",fontSize:12}}>اضغط لرفع صورة</div>
                  <div style={{fontSize:9,color:"#1a1510"}}>JPG, PNG, WEBP</div>
                </div>
                :<div style={{padding:14,display:"inline-block",position:"relative"}}>
                  <div style={{position:"relative",display:"inline-block"}}>
                    <canvas ref={canvasRef} style={{display:"block",transform:`scale(${zoom})`,transformOrigin:"top right",imageRendering:zoom>=2?"pixelated":"auto",boxShadow:"0 6px 40px rgba(0,0,0,0.9)",borderRadius:2}}/>
                    <canvas ref={overlayRef} style={{position:"absolute",top:0,right:0,width:"100%",height:"100%",transform:`scale(${zoom})`,transformOrigin:"top right",pointerEvents:"none"}}/>
                  </div>
                </div>}
            </div>}

          {/* Chat panel */}
          {showChat&&(
            <div style={{width:300,borderRight:"1px solid #1a1510",background:"#0b0907",display:"flex",flexDirection:"column",flexShrink:0,animation:"fadeIn 0.2s ease"}}>

              {/* Chat header */}
              <div style={{padding:"8px 10px",borderBottom:"1px solid #1a1510"}}>
                <div style={{fontSize:7,color:"#2a2010",letterSpacing:"0.2em"}}>◈ FORENSIC ASSISTANT</div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:11,color:"#c4a87a"}}>مناقشة النتائج</span>
                  <span style={{fontSize:9,color:activeImg?"#4a8a4a":"#3a3020"}}>{activeImg?"الصورة مرئية ✓":"لا صورة"}</span>
                </div>
              </div>

              {/* Quick prompts */}
              <div style={{padding:"5px 8px",borderBottom:"1px solid #1a1510",display:"flex",flexDirection:"column",gap:2}}>
                {["ما الذي تراه بالضبط؟","هل التدخل البشري واضح؟","صف الأنماط المتكررة","ما توصيتك للتأكيد؟"].map(q=>(
                  <button key={q} onClick={()=>setChatIn(q)}
                    style={{padding:"3px 6px",fontSize:9,textAlign:"right",background:"#0f0c08",border:"1px solid #1a1510",borderRadius:3,color:"#4a3c28",cursor:"pointer"}}>
                    {q}
                  </button>
                ))}
              </div>

              {/* Messages */}
              <div style={{flex:1,overflowY:"auto",padding:"8px",display:"flex",flexDirection:"column",gap:6}}>
                {chatMsgs.map((m,i)=>(
                  <div key={i} style={{
                    background:m.role==="user"?"#1a1810":"#0f0c08",
                    border:"1px solid "+(m.role==="user"?"#3a3020":"#1a1510"),
                    borderRadius:m.role==="user"?"7px 7px 2px 7px":"7px 7px 7px 2px",
                    padding:"7px 9px",fontSize:11,
                    color:m.role==="user"?"#e8d4a0":"#a09070",
                    lineHeight:1.65,maxWidth:"94%",
                    alignSelf:m.role==="user"?"flex-end":"flex-start",
                    direction:"rtl"
                  }}>{m.content}</div>
                ))}
                {chatLoading&&(
                  <div style={{display:"flex",gap:4,padding:"4px 8px"}}>
                    {[0,1,2].map(i=>(
                      <div key={i} style={{width:6,height:6,borderRadius:"50%",background:"#3a3020",animation:`dot 1.2s ${i*0.15}s infinite ease-in-out`}}/>
                    ))}
                  </div>
                )}
                <div ref={chatEndRef}/>
              </div>

              {/* Context bar */}
              {(st.aiPhases.p3||st.findings.length>0)&&(
                <div style={{padding:"3px 8px",borderTop:"1px solid #1a1510",fontSize:8,color:"#2a2010"}}>
                  {st.aiPhases.p3?`الحكم: ${st.aiPhases.p3.verdict} · `:""}
                  {st.findings.filter(f=>f.imageId===st.activeImageId).length} اكتشاف
                </div>
              )}

              {/* Input */}
              <div style={{padding:"7px 8px",borderTop:"1px solid #1a1510",display:"flex",gap:4}}>
                <input value={chatIn} onChange={e=>setChatIn(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();}}}
                  placeholder="اسأل عن الصورة..." disabled={!apiKey}
                  style={{flex:1,fontSize:11,padding:"6px 8px",background:"#0f0c08",border:"1px solid #2a2010",borderRadius:5,color:"#c8b090",fontFamily:"inherit",direction:"rtl",outline:"none"}}/>
                <button onClick={sendChat} disabled={chatLoading||!chatIn.trim()||!apiKey}
                  style={{padding:"6px 11px",background:chatLoading||!chatIn.trim()?"#1a1510":"linear-gradient(135deg,#2a1e10,#4a3020)",border:"1px solid "+(chatLoading?"#1a1510":"#5a4030"),borderRadius:5,color:chatLoading?"#2a2010":"#e8d4a0",fontSize:13,cursor:"pointer"}}>
                  {chatLoading?"…":"→"}
                </button>
              </div>
            </div>
          )}
        </div>

        {/* Verdict bar */}
        {st.aiPhases.p3&&(
          <div style={{padding:"5px 10px",borderTop:"1px solid #1a1510",background:"#0b0907",display:"flex",alignItems:"center",gap:10,flexShrink:0,animation:"fadeIn 0.4s ease"}}>
            <span style={{fontSize:12,fontWeight:700,color:verdictColor(st.aiPhases.p3.verdict)}}>{st.aiPhases.p3.verdict}</span>
            <span style={{fontSize:10,color:"#6a5040"}}>{st.aiPhases.p3.material}</span>
            {st.aiPhases.p3.top_matches?.map((m,i)=>(
              <span key={i} style={{fontSize:9,color:"#4a3c28"}}><span style={{color:"#e8c97a"}}>{m.score}%</span> {m.label}</span>
            ))}
            <span style={{marginRight:"auto",fontSize:9,color:"#3a3020",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{st.aiPhases.p3.action}</span>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
