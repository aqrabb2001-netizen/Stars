<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="محلل جنائي"/>
    <meta name="theme-color" content="#080604"/>
    
    <!-- دمج بيانات المانيفست كـ Metadata -->
    <meta name="application-name" content="محلل جنائي بصري">
    <meta name="description" content="نظام التحليل الجنائي البصري المتقدم">

    <title>◈ محلل جنائي بصري</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

    <style>
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        html,body,#root{width:100%;height:100%;overflow:hidden;background:#080604;color:#c8b090;font-family:sans-serif;}
        .container { display: flex; flex-direction: column; height: 100vh; padding: 10px; }
        .header { text-align: center; padding: 10px; border-bottom: 1px solid #2a2010; color: #c4a87a; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; overflow: auto; background: #000; position: relative; }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
        .controls { height: 200px; overflow-y: auto; background: #0f0c08; padding: 10px; border-top: 1px solid #2a2010; }
        .btn { background: #2a2010; color: #c4a87a; padding: 10px; border-radius: 4px; margin: 5px; width: calc(50% - 10px); display: inline-block; text-align: center; font-size: 12px;}
        input[type=range] { width: 100%; margin: 10px 0; }
        .recipe-card { background: #1a1510; padding: 8px; margin-bottom: 5px; border-radius: 4px; cursor: pointer; border: 1px solid #3a3020; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// --- المحرك الفلتر (تم استخراجه من كودك) ---
const gray = (r,g,b) => 0.299*r + 0.587*g + 0.114*b;
const clamp = v => Math.max(0, Math.min(255, v));

function App() {
    const [image, setImage] = useState(null);
    const canvasRef = useRef(null);
    const fileRef = useRef(null);

    const handleUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    setImage(img);
                    draw(img);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    };

    const draw = (img) => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
    };

    // فلتر توضيحي (Invert)
    const applyInvert = () => {
        if (!image) return;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
            data[i] = 255 - data[i];
            data[i+1] = 255 - data[i+1];
            data[i+2] = 255 - data[i+2];
        }
        ctx.putImageData(imageData, 0, 0);
    };

    const applyGrayscale = () => {
        if (!image) return;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
            const v = gray(data[i], data[i+1], data[i+2]);
            data[i] = data[i+1] = data[i+2] = v;
        }
        ctx.putImageData(imageData, 0, 0);
    };

    return (
        <div className="container">
            <div className="header">
                <h3>◈ محلل جنائي بصري</h3>
            </div>
            
            <div className="canvas-area">
                {!image && <p style={{color:'#4a3c28'}}>يرجى رفع صورة للبدء...</p>}
                <canvas ref={canvasRef}></canvas>
            </div>

            <div className="controls">
                <input type="file" ref={fileRef} onChange={handleUpload} style={{display:'none'}} accept="image/*" />
                <button className="btn" onClick={() => fileRef.current.click()}>📁 رفع صورة</button>
                <button className="btn" onClick={() => draw(image)}>🔄 الأصل</button>
                <button className="btn" onClick={applyInvert}>↺ عكس الألوان</button>
                <button className="btn" onClick={applyGrayscale}>▣ تحويل رمادي</button>
                
                <div style={{marginTop:15}}>
                    <p style={{fontSize:11, color:'#c4a87a'}}>قوة التحليل الجنائي:</p>
                    <input type="range" min="0" max="100" />
                </div>
            </div>
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
